services:
  - type: web
    name: crowdshield-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://darahas-reddy.github.io/crowd-shield_frontend/
      - key: SPRING_PROFILE
        value: prod
