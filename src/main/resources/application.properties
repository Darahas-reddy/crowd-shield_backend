spring.application.name=crowd-shield

# ── MongoDB ──────────────────────────────────────────
spring.data.mongodb.uri=mongodb+srv://Crowd-shield:samudrik@myatlasclusteredu.hr9tt.mongodb.net/?appName=myAtlasClusterEDU
spring.data.mongodb.database=crowdshield

# ── Server ───────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── Scheduling ───────────────────────────────────────
spring.task.scheduling.pool.size=4

# ── WebSocket topics ─────────────────────────────────
# /topic/zones     → zone list + stats on every change
# /topic/live      → GPS user positions on every ping
# /topic/alerts    → alert list on every ack/create
# /topic/incidents → incident list on every change
# /topic/history   → snapshot broadcast every 30s

# ── Twilio (leave blank to disable SMS/WhatsApp) ─────
twilio.enabled=false
twilio.account-sid=
twilio.auth-token=
twilio.from-number=
twilio.whatsapp-number=whatsapp:+14155238886
twilio.cooldown-minutes=10

# ── Logging ──────────────────────────────────────────
logging.level.com.crowdshield=INFO
logging.level.org.springframework.web.socket=WARN

# ── JWT ──────────────────────────────────────────────
# CHANGE THIS in production — must be 32+ characters
jwt.secret=${JWT_SECRET:crowdshield-dev-secret-key-change-in-prod-32chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Spring Security ──────────────────────────────────
spring.security.user.name=disabled

# ── AI Advisor (Claude) ───────────────────────────────
# Get your key from https://console.anthropic.com
# Leave blank to use demo mode (no API calls)
anthropic.api-key=${ANTHROPIC_API_KEY:}
